<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sendData глубокая диагностика</title>
  <style>
    body { font-family: monospace; text-align: left; padding: 20px; }
    button { padding: 12px 24px; font-size: 16px; margin: 5px; cursor: pointer; }
    #log { background: #f5f5f5; padding: 10px; border-radius: 6px; white-space: pre-wrap; font-size: 13px; max-height: 70vh; overflow-y: auto; }
    .red { color: red; }
    .green { color: green; }
  </style>
</head>
<body>
  <h3>🩺 Диагностика sendData</h3>
  <button id="btnSend">📤 sendData("Привет!")</button>
  <button id="btnSendJson">📤 sendData(JSON)</button>
  <button id="btnFetch">🧪 fetch-отправка</button>
  <button id="btnClose">🚪 Закрыть</button>
  <div id="log"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const logDiv = document.getElementById('log');

    function log(msg, className = '') {
      const line = document.createElement('div');
      line.textContent = msg;
      if (className) line.className = className;
      logDiv.appendChild(line);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Общая информация
    log('Платформа: ' + tg.platform);
    log('Версия WebApp: ' + tg.version);
    log('isVersionAtLeast("6.1"): ' + tg.isVersionAtLeast('6.1'));
    log('typeof sendData: ' + typeof tg.sendData);
    log('sendData в прототипе: ' + (typeof tg.sendData === 'function' ? 'да' : 'нет'));

    const unsafe = tg.initDataUnsafe;
    log('query_id: ' + unsafe.query_id);
    log('user: ' + (unsafe.user ? unsafe.user.id : 'нет'));
    log('start_param: ' + (unsafe.start_param || 'нет'));

    // Попробуем вывести полную initData (сырую строку) — она подписывается Telegram
    log('initData (первые 100 символов): ' + tg.initData.substring(0, 100) + '...');

    // Проверяем, что окно открыто через кнопку web_app (query_id есть)
    const canUseSendData = !!unsafe.query_id && !!unsafe.user;
    log(canUseSendData ? '✅ query_id + user = данные можно отправлять' : '❌ Нет query_id или user', canUseSendData ? 'green' : 'red');

    tg.ready();

    // ---------- Кнопка 1: простой sendData ----------
    document.getElementById('btnSend').addEventListener('click', () => {
      log('▶ Нажата кнопка sendData("Привет!")');
      if (!canUseSendData) {
        log('❌ Нет query_id/user', 'red');
        return;
      }
      if (typeof tg.sendData !== 'function') {
        log('❌ sendData не функция', 'red');
        return;
      }

      try {
        const ret = tg.sendData('Привет!');
        log('📤 sendData вызван, возврат: ' + typeof ret);
        // Не закрываем окно — ждём, что Telegram закроет сам
        setTimeout(() => {
          if (document.visibilityState === 'visible') {
            log('⚠️ Прошло 2 секунды, окно не закрылось. sendData, вероятно, не сработал.', 'red');
          }
        }, 2000);
      } catch (e) {
        log('❌ Ошибка: ' + e.message, 'red');
      }
    });

    // ---------- Кнопка 2: sendData с JSON ----------
    document.getElementById('btnSendJson').addEventListener('click', () => {
      log('▶ Нажата кнопка sendData(JSON)');
      if (!canUseSendData) return;
      if (typeof tg.sendData !== 'function') return;
      try {
        const json = JSON.stringify({ action: 'hello', from: 'diagnostic' });
        const ret = tg.sendData(json);
        log('📤 sendData с JSON вызван, возврат: ' + typeof ret);
        setTimeout(() => {
          if (document.visibilityState === 'visible') {
            log('⚠️ Окно не закрылось через 2 сек.', 'red');
          }
        }, 2000);
      } catch (e) {
        log('❌ Ошибка: ' + e.message, 'red');
      }
    });

    // ---------- Кнопка 3: fetch (заведомо рабочий способ) ----------
    document.getElementById('btnFetch').addEventListener('click', async () => {
      log('▶ fetch-отправка');
      const BOT_TOKEN = '8891675732:AAGgPRMnf2BUbjN1dVDjDWhl1ERlVb0yBKE';  // замените
      const chatId = unsafe.user?.id;
      if (!chatId) { log('❌ нет chat_id', 'red'); return; }
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: chatId, text: '🔧 Диагностический fetch' })
        });
        const data = await res.json();
        log('Ответ API: ' + JSON.stringify(data));
        if (data.ok) log('✅ fetch-сообщение отправлено', 'green');
        else log('❌ Ошибка: ' + data.description, 'red');
      } catch (e) {
        log('❌ Сетевая ошибка: ' + e.message, 'red');
      }
    });

    // ---------- Кнопка 4: закрыть ----------
    document.getElementById('btnClose').addEventListener('click', () => {
      log('🚪 Закрытие вручную');
      tg.close();
    });
  </script>
</body>
</html>
