<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ввод API-ключа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        function submitKey() {
            const apiKey = document.getElementById('api_key').value.trim();
            const urlParams = new URLSearchParams(window.location.search);
            const sessionToken = urlParams.get('token');
        
            // Проверка доступности метода
            if (typeof Telegram === 'undefined' || typeof Telegram.WebApp === 'undefined') {
                alert('Telegram.WebApp не загружен. Откройте страницу через кнопку в Telegram, а не в браузере.');
                return;
            }
            if (typeof Telegram.WebApp.sendData !== 'function') {
                alert('Метод sendData недоступен. Попробуйте обновить Telegram.');
                return;
            }
        
            try {
                Telegram.WebApp.sendData(JSON.stringify({
                    session_token: sessionToken,
                    api_key: apiKey
                }));
                alert('Данные отправлены успешно');
                Telegram.WebApp.close();
            } catch (e) {
                alert('Ошибка при отправке данных: ' + e.message);
            }
        }
        </script>
</head>
<body>
    <h2>Введите API-ключ Wildberries</h2>
    <input type="text" id="api_key" placeholder="Ключ">
    <button onclick="submitKey()">Сохранить</button>


    </script>
</body>
</html>
