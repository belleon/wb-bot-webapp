<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Привет Mini App</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 80px; }
        button { padding: 12px 30px; font-size: 18px; }
        #status { margin-top: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <button id="btn">👋 Сказать «Привет»</button>
    <div id="status"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        const statusDiv = document.getElementById('status');

        // Проверяем, что метод sendData вообще существует
        if (typeof tg.sendData !== 'function') {
            statusDiv.innerText = '❌ sendData недоступен.\nПричина: не добавлен домен в BotFather.';
        } else {
            statusDiv.innerText = '✅ sendData доступен. Можно отправлять данные.';
        }

        document.getElementById('btn').addEventListener('click', () => {
            if (typeof tg.sendData !== 'function') {
                statusDiv.innerText = '❌ sendData всё ещё недоступен. Добавьте домен в BotFather!';
                return;
            }
            
            tg.sendData('Привет!')
                .then(() => {
                    statusDiv.innerText = '✅ Отправлено!';
                })
                .catch(err => {
                    statusDiv.innerText = '❌ Ошибка: ' + JSON.stringify(err);
                });
        });
    </script>
</body>
</html>
