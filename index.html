<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h3>Тест отправки</h3>
    <input type="text" id="inp" placeholder="Текст">
    <button id="btn" disabled>Отправить</button>
    <div id="log"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const inp = document.getElementById('inp');
        const btn = document.getElementById('btn');
        const log = document.getElementById('log');

        inp.addEventListener('input', () => {
            btn.disabled = inp.value.trim() === '';
        });

        btn.addEventListener('click', () => {
            const text = inp.value.trim();
            if (!text) return;

            log.textContent = 'Отправляю: ' + text;
            try {
                tg.sendData(JSON.stringify({ test: text }));
                log.textContent += ' | sendData вызван';
            } catch (e) {
                log.textContent = 'Ошибка: ' + e.message;
            }
        });
    </script>
</body>
</html>
