<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ввод API-ключа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        function submitKey() {
    const apiKey = document.getElementById('api_key').value.trim();
    const urlParams = new URLSearchParams(window.location.search);
    const sessionToken = urlParams.get('token');

    var payload = JSON.stringify({
        session_token: sessionToken,
        api_key: apiKey
    });

    try {
        var result = Telegram.WebApp.sendData(payload);
        alert('sendData вернул: ' + result); // покажет true или false
        if (result) {
            Telegram.WebApp.close();
        } else {
            alert('sendData вернул false — данные не отправлены');
        }
    } catch (e) {
        alert('Ошибка sendData: ' + e.message);
    }
}
        </script>
</head>
<body>
    <h2>Введите API-ключ Wildberries</h2>
    <input type="text" id="api_key" placeholder="Ключ">
    <button onclick="submitKey()">Сохранить</button>


    </script>
</body>
</html>
