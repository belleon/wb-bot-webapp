<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini App Привет</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; }
    button { padding: 12px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
    #log {
      margin-top: 20px;
      white-space: pre-wrap;
      text-align: left;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <button id="btnSend">👋 Сказать «Привет»</button>
  <button id="btnClose">🧪 Закрыть окно (тест)</button>
  <div id="log"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const logDiv = document.getElementById('log');

    function log(msg) {
      logDiv.innerText += msg + '\n';
    }

    // Определяем среду выполнения
    const isInsideTelegram = tg.platform !== 'unknown';

    if (isInsideTelegram) {
      log('✅ Вы внутри Telegram Mini App (' + tg.platform + ')');
      log('sendData доступен: ' + (typeof tg.sendData === 'function' ? 'да' : 'нет'));
    } else {
      log('⚠️ Режим разработки (браузер)');
      log('Данные НЕ будут отправлены боту');
    }

    document.getElementById('btnSend').addEventListener('click', () => {
      if (!isInsideTelegram) {
        log('💡 Это браузерная имитация. Откройте приложение из Telegram, чтобы отправить данные.');
        return;
      }

      log('▶ Нажата кнопка отправки...');
      try {
        const result = tg.sendData("Привет!");
        log('Тип результата: ' + typeof result);

        if (result && typeof result.then === 'function') {
          // это промис – обрабатываем
          result.then(() => {
            log('✅ Данные отправлены успешно. Окно закроется автоматически.');
          }).catch(err => {
            log('❌ Ошибка при отправке: ' + JSON.stringify(err));
            // при ошибке попробуем закрыть окно вручную
            setTimeout(() => tg.close(), 500);
          });
        } else {
          // промис не вернулся – помогаем закрыть окно
          log('⚠️ sendData не вернул промис, закроем окно принудительно через 1 сек');
          setTimeout(() => tg.close(), 1000);
        }
      } catch (e) {
        log('❌ Исключение: ' + e.message);
      }
    });

    document.getElementById('btnClose').addEventListener('click', () => {
      if (isInsideTelegram) {
        tg.close();
      } else {
        log('🧪 Кнопка «Закрыть» работает только в Telegram');
      }
    });
  </script>
</body>
</html>
