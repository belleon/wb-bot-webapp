<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini App Привет</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 80px; }
    button { padding: 12px 30px; font-size: 18px; margin: 10px; }
    #log { margin-top: 20px; white-space: pre-wrap; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <button id="btnSend">👋 Сказать «Привет»</button>
  <button id="btnClose">🧪 Закрыть окно (тест)</button>
  <div id="log"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const logDiv = document.getElementById('log');

    function log(msg) { logDiv.innerText += msg + '\n'; }

    log(typeof tg.sendData === 'function' ? '✅ sendData доступен' : '❌ sendData недоступен');

    document.getElementById('btnSend').addEventListener('click', () => {
      log('▶ Нажата кнопка отправки...');
      try {
        const result = tg.sendData("Привет!");
        log('result: ' + typeof result);

        if (result && typeof result.then === 'function') {
          // Это промис – обрабатываем стандартно
          result.then(() => {
            log('✅ Успех! Окно закроется автоматически.');
          }).catch(err => {
            log('❌ Ошибка: ' + JSON.stringify(err));
            setTimeout(() => tg.close(), 500);
          });
        } else {
          // Промис не вернулся, окно может не закрыться – помогаем
          log('⚠️ sendData не вернул промис, принудительно закроем окно через 1 сек');
          setTimeout(() => tg.close(), 1000);
        }
      } catch (e) {
        log('❌ Исключение: ' + e.message);
      }
    });

    document.getElementById('btnClose').addEventListener('click', () => {
      tg.close();
    });
  </script>
</body>
</html>
