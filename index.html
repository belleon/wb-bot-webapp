<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Привет</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: var(--tg-theme-button-color, #2aabee);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        #greeting {
            display: none;
            font-size: 24px;
            margin-top: 20px;
            color: var(--tg-theme-hint-color, #333);
        }
        #debug {
            margin-top: 20px;
            font-size: 14px;
            color: red;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <button id="sayHelloBtn">👋 Сказать «Привет»</button>
    <div id="greeting">Привет!</div>
    <div id="debug"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const debug = document.getElementById("debug");

        document.getElementById("sayHelloBtn").addEventListener("click", () => {
            // Показываем приветствие сразу
            document.getElementById("greeting").style.display = "block";

            // Отправляем данные с обработкой ошибок
            try {
                tg.sendData("Привет!")
                    .then(() => {
                        // Успех – окно закроется автоматически, но можно ничего не делать
                        debug.innerText = "Данные отправлены, окно закроется...";
                    })
                    .catch((err) => {
                        debug.innerText = "Ошибка sendData: " + JSON.stringify(err);
                        console.error("sendData error:", err);
                    });
            } catch (e) {
                debug.innerText = "Исключение при вызове sendData: " + e.message;
                console.error(e);
            }
        });

        // // Дополнительно: принудительно закрыть через 3 секунды, если не закрылось
        // setTimeout(() => {
        //     if (tg.isExpanded) {
        //         tg.close();
        //     }
        // }, 3000);
    </script>
</body>
</html>
