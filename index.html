<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест передачи API-ключа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; font-size: 16px; }
        .status { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Тест отправки API-ключа</h3>
    <input type="text" id="apiKey" placeholder="Введите любой текст">
    <button id="sendBtn" disabled>Отправить в бота</button>
    <div class="status" id="status"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const apiKeyInput = document.getElementById('apiKey');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        apiKeyInput.addEventListener('input', () => {
            sendBtn.disabled = apiKeyInput.value.trim() === '';
        });

        sendBtn.addEventListener('click', () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return;

            // Отправляем открытый текст в поле "api_key"
            tg.sendData(JSON.stringify({ api_key: apiKey }));
            statusDiv.textContent = '✅ Данные отправлены. Окно закроется автоматически.';
        });
    </script>
</body>
</html>
