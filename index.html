<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отладка sendData</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 80px; }
    button { padding: 12px 30px; font-size: 18px; margin: 10px; }
    #log { margin-top: 20px; white-space: pre-wrap; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; color: #333; }
  </style>
</head>
<body>
  <button id="btnSend">👋 Сказать «Привет»</button>
  <button id="btnClose">🧪 Просто закрыть окно</button>
  <div id="log"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const logDiv = document.getElementById('log');

    function log(msg) {
      logDiv.innerText += msg + '\n';
    }

    // Проверим доступность API
    if (typeof tg.sendData !== 'function') {
      log('❌ sendData недоступен. Проверьте домен в BotFather.');
    } else {
      log('✅ sendData доступен.');
    }

    // Тест закрытия окна – работает ли вообще WebApp API
    document.getElementById('btnClose').addEventListener('click', () => {
      tg.close();
    });

    // Отправка данных
    document.getElementById('btnSend').addEventListener('click', () => {
      log('▶ Нажата кнопка отправки...');
      
      // Используем try/catch и обработчики then/catch
      try {
        const promise = tg.sendData("Привет!");
        log('▶ sendData вызван, ожидаем...');
        
        promise.then(() => {
          // Сюда мы попадём, только если отправка успешна,
          // но окно может закрыться мгновенно – вы не увидите эту запись.
          log('✅ sendData выполнен успешно! Окно закроется.');
        }).catch((err) => {
          log('❌ Ошибка sendData: ' + JSON.stringify(err, null, 2));
        });
      } catch (e) {
        log('❌ Исключение при вызове: ' + e.message);
      }
    });
  </script>
</body>
</html>
