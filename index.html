<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // Проверка выполняется после загрузки библиотеки
    Telegram.WebApp.ready(); // важно: сигнализирует, что приложение готово
    setTimeout(function() {
        var msg = '';
        if (typeof Telegram === 'undefined') {
            msg = 'Telegram не определён';
        } else if (typeof Telegram.WebApp === 'undefined') {
            msg = 'Telegram.WebApp не определён';
        } else if (!Telegram.WebApp.initData) {
            msg = 'initData отсутствует (возможно, не в контексте WebApp)';
        } else {
            msg = '✅ Контекст WebApp подтверждён. initData длина: ' + Telegram.WebApp.initData.length;
        }
        alert(msg);
    }, 200);
</script>
</head>
<body>
<button onclick="alert(Telegram.WebApp.sendData('ok'))">Send ok</button>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
