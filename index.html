<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Безусловная отправка тестовых данных при загрузке (дополнительно)
    // (закомментируйте, если не нужно)
    // tg.sendData(JSON.stringify({ test: 'auto' }));

    // Существующая кнопка "Отправить"
    document.getElementById('sendBtn').addEventListener('click', () => {
        const text = document.getElementById('apiKey').value.trim() || 'пусто';
        tg.sendData(JSON.stringify({ test: text }));
        // Для наглядности покажем, что кнопка нажата
        document.getElementById('status').textContent = 'Отправлено: ' + text;
    });

    // Добавим явную проверку на существование sendData
    if (typeof tg.sendData !== 'function') {
        document.getElementById('status').textContent = 'ОШИБКА: sendData недоступен!';
    }
</script>
