<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест sendData</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
      padding: 0 16px;
    }
    button {
      padding: 14px 32px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #btnSend { background: #4CAF50; color: white; }
    #btnClose { background: #ccc; color: black; }
    #log {
      margin-top: 20px;
      text-align: left;
      background: #f9f9f9;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h3>🔬 Тест sendData</h3>
  <button id="btnSend">📤 Отправить "Привет!"</button>
  <button id="btnClose">🚪 Закрыть окно</button>
  <div id="log"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const logDiv = document.getElementById('log');

    function log(msg) {
      logDiv.textContent += msg + '\n';
      // Автопрокрутка вниз
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // --- Базовая информация ---
    log('🔵 Платформа: ' + tg.platform);
    log('🔵 Версия WebApp: ' + tg.version);

    // Проверка initDataUnsafe
    const unsafe = tg.initDataUnsafe;
    log('🔵 query_id: ' + unsafe.query_id);
    log('🔵 user: ' + (unsafe.user ? JSON.stringify(unsafe.user.first_name) : 'отсутствует'));
    log('🔵 start_param: ' + (unsafe.start_param || 'нет'));

    if (unsafe.user && unsafe.query_id) {
      log('✅ Сессия валидна – Mini App открыт через бота');
    } else {
      log('⚠️ Сессия невалидна! Данные не уйдут. Откройте приложение через кнопку бота.');
    }

    // Сообщаем Telegram, что приложение готово
    tg.ready();

    // --- Кнопка отправки данных ---
    document.getElementById('btnSend').addEventListener('click', () => {
      log('▶ Нажата кнопка отправки');

      // Дополнительная проверка
      if (!unsafe.user || !unsafe.query_id) {
        log('❌ Отправка невозможна: нет query_id/user. Откройте Mini App через кнопку бота.');
        return;
      }

      if (typeof tg.sendData !== 'function') {
        log('❌ Метод sendData не поддерживается этой версией Telegram');
        return;
      }

      try {
        const result = tg.sendData('Привет!');
        log('📤 sendData вызван, результат: ' + typeof result);

        // Промис или не промис – не важно, данные уже отправляются
        if (result && typeof result.then === 'function') {
          result.then(() => {
            log('✅ Промис выполнен, окно закроется');
          }).catch(e => {
            log('❌ Ошибка в промисе: ' + e.message);
          });
        } else {
          log('ℹ️ sendData не возвращает промис. Данные всё равно отправлены.');
          // Принудительно закроем через 500 мс, если окно ещё открыто
          setTimeout(() => {
            log('⏳ Принудительное закрытие окна...');
            tg.close();
          }, 500);
        }
      } catch (e) {
        log('❌ Ошибка при вызове sendData: ' + e.message);
        setTimeout(() => tg.close(), 1000);
      }
    });

    // --- Кнопка закрытия ---
    document.getElementById('btnClose').addEventListener('click', () => {
      log('🚪 Закрытие по кнопке');
      tg.close();
    });
  </script>
</body>
</html>
