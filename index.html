<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Привет</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: var(--tg-theme-button-color, #2aabee);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        #greeting {
            display: none;
            font-size: 24px;
            margin-top: 20px;
            color: var(--tg-theme-hint-color, #333);
        }
    </style>
</head>
<body>
    <button id="sayHelloBtn">👋 Сказать «Привет»</button>
    <div id="greeting">Привет!</div>

    <!-- Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // обязательно сообщить Telegram, что приложение готово

        document.getElementById("sayHelloBtn").addEventListener("click", () => {
            // Показываем приветствие на странице
            document.getElementById("greeting").style.display = "block";

            // Отправляем данные боту
            tg.sendData("Привет!");
        });
    </script>
</body>
</html>
